name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ai_dream
          POSTGRES_USER: ai_dream
          POSTGRES_PASSWORD: ai_dream
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ai_dream -d ai_dream"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: test
      DEFAULT_TENANT_ID: default
      DEFAULT_WORKSPACE_ID: default
      DATABASE_URL: postgresql+psycopg://ai_dream:ai_dream@localhost:5432/ai_dream
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Lint backend
        working-directory: backend
        run: ruff check .
      - name: Test backend
        working-directory: backend
        run: pytest -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck
      - name: Test frontend
        working-directory: frontend
        run: npm test
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Start local stack
        run: docker compose up -d --build
      - name: Wait for backend health
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent --show-error http://localhost:8000/api/health; then
              echo "Backend health check passed on attempt ${attempt}."
              exit 0
            fi

            echo "Waiting for backend health (${attempt}/60)..."
            sleep 2
          done

          echo "Backend did not become healthy in time."
          docker compose ps
          docker compose logs backend
          exit 1
      - name: Run backend migrations
        run: docker compose exec -T backend alembic upgrade head
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Wait for frontend home page
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent --show-error http://localhost:5173; then
              echo "Frontend home page reached on attempt ${attempt}."
              exit 0
            fi

            echo "Waiting for frontend home page (${attempt}/60)..."
            sleep 2
          done

          echo "Frontend did not become reachable in time."
          docker compose ps
          docker compose logs frontend
          exit 1
      - name: Run e2e smoke tests
        working-directory: frontend
        run: npm run e2e
